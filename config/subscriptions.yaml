# Monthly subscription costs per tool (USD)
# Update these to reflect your actual costs

tools:
  claude_code:
    name: "Claude Code"
    monthly_cost: 20.00      # Anthropic Pro/Claude Code subscription
    color: "#CC785C"

  cursor:
    name: "Cursor"
    monthly_cost: 20.00      # Cursor Pro subscription
    color: "#808080"

  chatgpt:
    name: "ChatGPT"
    monthly_cost: 20.00      # ChatGPT Plus subscription
    color: "#888888"

  gemini:
    name: "Gemini"
    monthly_cost: 0.00       # Free tier, or set to 21.99 for Google One AI Premium
    color: "#1FBFF3"

# Window title patterns for detection (case-insensitive substring match)
window_patterns:
  cursor:
    - "Cursor"
  chatgpt:
    - "ChatGPT"
    - "chat.openai.com"
  gemini:
    - "Gemini"
    - "gemini.google.com"

# AFK threshold in seconds (default: 10 minutes)
afk_threshold_seconds: 600

# Session gap threshold — new session if gap > this many seconds
session_gap_seconds: 600

# Repo roots to scan for git activity (set locally per device — not used by dashboard)
repo_roots:
  - "D:/"
  - "C:/Users/rpsrb"
